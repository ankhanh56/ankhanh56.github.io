<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./images/ayakakhung.webp" />
    <link rel="stylesheet" href="css/time.css" />
    <title>Time</title>
  </head>
  <body onload="initClock()">
    <section>
      <div class="datetime">
        <div class="date">
          <span id="dayname"> Day </span>,
          <span id="month"> Month </span>
          <span id="daynum"> 00 </span>,
          <span id="year"> Year </span>
        </div>
        <div class="time">
          <div class="clock">
            <span id="hour">12</span>
            <span class="colon">:</span>
            <span id="minutes">04</span>
            <span class="colon">:</span>
            <span id="seconds" class="seconds">27</span>
          </div>
          <span id="period" class="period">AM</span>
        </div>
      </div>
    </section>

    <!-- SCRIPTS -->
    <script>
      function updateClock() {
        const now = new Date();

        let hou = now.getHours();
        let pe = "AM";

        if (hou === 0) hou = 12;
        if (hou > 12) {
          hou -= 12;
          pe = "PM";
        }

        const months = [
          "January",
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December",
        ];
        const week = [
          "Sunday",
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday",
          "Saturday",
        ];

        document.getElementById("dayname").textContent = week[now.getDay()];
        document.getElementById("month").textContent = months[now.getMonth()];
        document.getElementById("daynum").textContent = String(
          now.getDate(),
        ).padStart(2, "0");
        document.getElementById("year").textContent = now.getFullYear();
        document.getElementById("hour").textContent = String(hou).padStart(
          2,
          "0",
        );
        document.getElementById("minutes").textContent = String(
          now.getMinutes(),
        ).padStart(2, "0");
        document.getElementById("seconds").textContent = String(
          now.getSeconds(),
        ).padStart(2, "0");
        document.getElementById("period").textContent = pe;
      }

      function initClock() {
        function tick() {
          updateClock();

          const now = new Date();
          const delay = 1000 - now.getMilliseconds();
          setTimeout(tick, delay);
        }
        tick();
      }
    </script>
  </body>
</html>
