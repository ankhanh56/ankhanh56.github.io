<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css?v1.1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="../images/ayakakhung.webp" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reseter.css/1.0.8/reseter.min.css">
    <title>World Cup 2026</title>
</head>

<body>
    <section class="page-title">
        <h1>WORLD CUP 2026</h1>
    </section>
    <section class="container-fluid gx-0 board-content">
        <div class="row g-0 h-100">
            <div class="col-4 round-col border-divider">
                <div class="round-heading">LƯỢT 1</div>
                <div class="match-stack" id="round-1"></div>
            </div>

            <div class="col-4 round-col border-divider">
                <div class="round-heading">LƯỢT 2</div>
                <div class="match-stack" id="round-2"></div>
            </div>

            <div class="col-4 round-col">
                <div class="round-heading">LƯỢT 3</div>
                <div class="match-stack" id="round-3"></div>
            </div>
        </div>
    </section>

    <section class="groups-section">
        <div class="groups-title">BẢNG ĐẤU</div>
        <div class="groups-grid" id="groups-grid"></div>
    </section>
    <script src="./js/main.js?v1.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</html>
