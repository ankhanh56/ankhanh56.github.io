name: Update wc2026.json from Google Sheets

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update JSON from Google Sheets
        working-directory: worldcup2026
        env:
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: node scripts/update-from-sheet.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worldcup2026/data/wc2026.json
          git diff --cached --quiet || git commit -m "Update wc2026.json from Google Sheets"
          git push

          